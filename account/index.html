<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<title>ORBITZ · My Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#07060d; --bg-2:#0b0a16;
  --surface:rgba(255,255,255,.038); --surface-2:rgba(255,255,255,.06); --surface-3:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.085); --line-2:rgba(255,255,255,.14);
  --text:#ececf6; --text-2:#c3c4d8; --muted:#878aa6;
  --primary:#b07cff; --primary-2:#6f5cff; --blue:#5b8cff; --green:#34d399; --amber:#f5b945; --red:#f87171;
  --glass-shadow:0 24px 60px -28px rgba(0,0,0,.85);
  --r:16px; --r-sm:11px;
  --glow:.85;
  font-synthesis:none;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Manrope",system-ui,sans-serif; color:var(--text); background:#040309;
  -webkit-font-smoothing:antialiased; line-height:1.5; overflow:hidden;
}
#root{height:100dvh}
.mono{font-family:"JetBrains Mono",monospace;font-feature-settings:"tnum"}
.dim{color:var(--muted)}
button{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ───────────── Stage / phone shell ───────────── */
.ac-stage{
  height:100dvh;width:100vw;display:grid;place-items:center;overflow:hidden;position:relative;
  background:
    radial-gradient(900px 620px at 78% -8%, rgba(111,92,255,calc(.18*var(--glow))), transparent 55%),
    radial-gradient(760px 560px at 8% 108%, rgba(176,124,255,calc(.13*var(--glow))), transparent 55%),
    #040309;
}
.ac-stage-stars{position:absolute;inset:0;pointer-events:none;opacity:.5;background-image:
  radial-gradient(1.4px 1.4px at 18% 24%,rgba(255,255,255,.7),transparent),
  radial-gradient(1.4px 1.4px at 72% 62%,rgba(255,255,255,.5),transparent),
  radial-gradient(1px 1px at 42% 82%,rgba(255,255,255,.55),transparent),
  radial-gradient(1px 1px at 86% 22%,rgba(255,255,255,.5),transparent),
  radial-gradient(1.4px 1.4px at 55% 12%,rgba(255,255,255,.5),transparent),
  radial-gradient(1px 1px at 9% 58%,rgba(255,255,255,.4),transparent),
  radial-gradient(1px 1px at 33% 46%,rgba(255,255,255,.35),transparent)}
.ac-phone{
  position:relative;z-index:1;width:100vw;height:100dvh;display:flex;flex-direction:column;
  background:linear-gradient(180deg,#0a0813,#070610);overflow:hidden;
}
@media(min-width:600px){
  .ac-phone{
    width:438px;height:min(94dvh,924px);border-radius:42px;
    border:1px solid var(--line-2);
    box-shadow:0 60px 140px -40px rgba(0,0,0,.9), 0 0 0 11px #0c0a16, 0 0 0 12px rgba(255,255,255,.05),
      inset 0 1px 0 rgba(255,255,255,.06);
  }
  .ac-app{border-radius:42px;overflow:hidden}
}
.ac-app{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}

/* faux status bar */
.ac-statusbar{display:flex;align-items:center;justify-content:space-between;padding:11px 24px 5px;
  font-size:13px;font-weight:700;letter-spacing:.02em;flex-shrink:0;z-index:5;position:relative}
.ac-sb-time{font-family:"Space Grotesk",sans-serif}
.ac-sb-icons{display:flex;align-items:center;gap:6px;opacity:.9}

/* app header */
.ac-header{display:flex;align-items:center;gap:12px;padding:6px 18px 14px;flex-shrink:0;z-index:4;position:relative}
.ac-header-titles{display:flex;flex-direction:column;min-width:0;flex:1}
.ac-header-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary)}
.ac-header-title{font-family:"Space Grotesk",sans-serif;font-size:22px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-back{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);cursor:pointer;transition:.15s}
.ac-back:hover{background:var(--surface-3);border-color:var(--line-2)}
.ac-header-action{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text-2);cursor:pointer;transition:.15s;position:relative}
.ac-header-action:hover{background:var(--surface-3);color:var(--text)}
.ac-action-dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px var(--primary);border:1.5px solid #0a0813}

/* content scroll */
.ac-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 18px 26px;-webkit-overflow-scrolling:touch}
.ac-content.has-nav{padding-bottom:96px}
.ac-screen{display:flex;flex-direction:column;gap:16px;animation:acIn .26s cubic-bezier(.2,.7,.3,1)}
@keyframes acIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* bottom nav */
.ac-bottomnav{position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;align-items:stretch;justify-content:space-around;
  padding:9px 12px calc(9px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(12,10,21,.55),rgba(8,7,14,.94));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line)}
.ac-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;background:none;border:none;
  color:var(--muted);cursor:pointer;transition:.16s;position:relative;border-radius:12px}
.ac-tab span{font-size:10.5px;font-weight:700;letter-spacing:.01em}
.ac-tab.active{color:#fff}
.ac-tab.active svg{color:var(--primary);filter:drop-shadow(0 0 8px rgba(176,124,255,.6))}
.ac-tab-ind{position:absolute;top:-9px;width:22px;height:3px;border-radius:3px;background:var(--primary);box-shadow:0 0 10px var(--primary)}
.ac-tab-badge{position:absolute;top:0px;right:calc(50% - 20px);min-width:16px;height:16px;padding:0 4px;border-radius:9px;
  background:var(--primary);color:#15091f;font-size:10px;font-weight:800;display:grid;place-items:center;font-family:"JetBrains Mono",monospace}

/* ───────────── Primitives (shared with admin vocab) ───────────── */
.oz-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--glass-shadow);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.oz-card::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 42%);opacity:.7}
.oz-card-hover{transition:.16s;cursor:pointer}
.oz-card-hover:active{transform:scale(.985)}
.oz-card-hover:hover{border-color:var(--line-2)}

.oz-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;
  font-weight:700;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:.16s;letter-spacing:.005em}
.oz-btn:active{transform:scale(.97)}
.oz-btn-primary{background:linear-gradient(180deg,#b483ff,#9a5cf6);color:#fff;
  box-shadow:0 8px 22px -8px rgba(154,92,246,.7),inset 0 1px 0 rgba(255,255,255,.25)}
.oz-btn-primary:hover{filter:brightness(1.08)}
.oz-btn-ghost{background:var(--surface-2);color:var(--text);border-color:var(--line)}
.oz-btn-ghost:hover{background:var(--surface-3);border-color:var(--line-2)}
.oz-btn-danger{background:rgba(248,113,113,.14);color:#fb9a9a;border-color:rgba(248,113,113,.35)}
.oz-btn-danger:hover{background:rgba(248,113,113,.22)}

.oz-status{display:inline-flex;align-items:center;gap:6px;border-radius:30px;border:1px solid;font-weight:700;letter-spacing:.01em;white-space:nowrap}
.oz-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.oz-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;border:1px solid;white-space:nowrap}
.oz-avatar{border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex-shrink:0;
  font-family:"Space Grotesk",sans-serif;letter-spacing:.02em;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}

.oz-field{display:flex;flex-direction:column;gap:7px}
.oz-field-label{font-size:12.5px;font-weight:600;color:var(--text-2)}
.oz-field-hint{font-size:11.5px;color:var(--muted)}
.oz-input-wrap{display:flex;align-items:center;gap:9px;padding:0 14px;height:46px;background:rgba(0,0,0,.28);
  border:1px solid var(--line);border-radius:12px;transition:.15s;position:relative}
.oz-input-wrap:focus-within{border-color:rgba(176,124,255,.55);box-shadow:0 0 0 3px rgba(176,124,255,.13)}
.oz-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;min-width:0;width:100%}
.oz-input::placeholder{color:var(--muted)}
.oz-select{appearance:none;cursor:pointer;padding-right:22px}
.oz-toggle{width:44px;height:26px;border-radius:30px;background:rgba(255,255,255,.12);border:1px solid var(--line);
  position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.oz-toggle[data-on="1"]{background:linear-gradient(90deg,#9a5cf6,#b483ff);border-color:transparent}
.oz-toggle-knob{position:absolute;top:50%;left:3px;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;
  background:#fff;transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,.4)}
.oz-toggle[data-on="1"] .oz-toggle-knob{left:21px}

.oz-section-title{display:flex;align-items:center;justify-content:space-between;gap:12px}
.oz-section-title h2{font-family:"Space Grotesk",sans-serif;font-size:15px;font-weight:600;letter-spacing:.01em}
.oz-link{color:var(--primary);cursor:pointer;font-weight:700;font-size:12.5px;background:none;border:none}

/* timeline */
.oz-timeline{display:flex;flex-direction:column}
.oz-tl-step{display:flex;gap:13px}
.oz-tl-rail{display:flex;flex-direction:column;align-items:center}
.oz-tl-node{width:24px;height:24px;border-radius:50%;border:2px solid;display:grid;place-items:center;flex-shrink:0;transition:.2s}
.oz-tl-line{width:2px;flex:1;min-height:24px;margin:3px 0}
.oz-tl-body{display:flex;flex-direction:column;gap:2px;padding-bottom:18px}
.oz-tl-step:last-child .oz-tl-body{padding-bottom:0}
.oz-tl-label{font-size:13.5px;font-weight:700}
.oz-tl-time{font-size:11.5px;color:var(--muted)}

/* striped placeholder */
.oz-proof{position:relative;border-radius:14px;border:1px solid var(--line);overflow:hidden;display:grid;place-items:center}
.oz-proof-stripes{position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.03) 0 10px,transparent 10px 20px),rgba(0,0,0,.25)}
.oz-proof-label{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:0 16px}
.oz-proof-label .mono{font-size:12px;color:var(--text-2);font-weight:600}
.oz-proof-label .mono.dim{font-size:11px;color:var(--muted);font-weight:500}

.oz-empty{display:flex;flex-direction:column;align-items:center;gap:9px;padding:42px 20px;color:var(--muted);font-size:13.5px;text-align:center}

/* upload drop */
.ac-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:26px 16px;
  border-radius:14px;border:1.5px dashed var(--line-2);background:rgba(0,0,0,.18);text-align:center;cursor:pointer;transition:.16s}
.ac-drop:hover{border-color:rgba(176,124,255,.5);background:rgba(176,124,255,.05)}
.ac-drop-title{font-size:13.5px;font-weight:700}
.ac-drop-sub{font-size:11.5px;color:var(--muted)}

/* generic rows / lists */
.ac-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left}
.ac-thumb{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:23px;flex-shrink:0;border:1px solid var(--line)}
.ac-row-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ac-row-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-row-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-amt{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:600}
.ac-divider{height:1px;background:var(--line);border:none;margin:0}

/* key-value */
.ac-kv{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--text-2)}
.ac-kv svg{color:var(--muted);flex-shrink:0}
.ac-kv-stack{display:flex;flex-direction:column;gap:13px}

/* quick action grid */
.ac-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.ac-quick-btn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 4px;border-radius:14px;
  background:var(--surface);border:1px solid var(--line);color:var(--text-2);cursor:pointer;transition:.16s}
.ac-quick-btn:hover{background:var(--surface-2);border-color:var(--line-2);color:#fff}
.ac-quick-btn:active{transform:scale(.95)}
.ac-quick-ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;border:1px solid var(--line-2)}
.ac-quick-lb{font-size:10.5px;font-weight:700;letter-spacing:.01em;text-align:center;line-height:1.2}

/* toast */
.ac-toast-wrap{position:absolute;left:0;right:0;bottom:84px;z-index:60;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 18px}
.ac-toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:13px;max-width:100%;
  background:linear-gradient(180deg,#1a1626,#13101d);border:1px solid var(--line-2);
  box-shadow:0 18px 44px -16px rgba(0,0,0,.85);font-size:13px;font-weight:600;
  animation:acToast .3s cubic-bezier(.2,.9,.3,1.3)}
@keyframes acToast{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
.ac-toast-ic{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;
  background:rgba(52,211,153,.18);color:var(--green)}

/* bottom sheet */
.ac-sheet-overlay{position:absolute;inset:0;z-index:70;background:rgba(4,3,9,0);transition:.25s;pointer-events:none;display:flex;align-items:flex-end}
.ac-sheet-overlay.open{background:rgba(4,3,9,.62);backdrop-filter:blur(5px);pointer-events:auto}
.ac-sheet{width:100%;background:linear-gradient(180deg,#16121f,#100d18);border-top:1px solid var(--line-2);
  border-radius:26px 26px 0 0;padding:8px 18px calc(22px + env(safe-area-inset-bottom));transform:translateY(100%);
  transition:transform .3s cubic-bezier(.3,.8,.3,1);max-height:88%;overflow-y:auto;box-shadow:0 -30px 70px -20px rgba(0,0,0,.8)}
.ac-sheet-overlay.open .ac-sheet{transform:translateY(0)}
.ac-sheet-grip{width:38px;height:4px;border-radius:4px;background:var(--line-2);margin:8px auto 14px}
.ac-sheet-title{font-family:"Space Grotesk",sans-serif;font-size:18px;font-weight:600;margin-bottom:4px}
.ac-sheet-sub{font-size:13px;color:var(--muted);margin-bottom:16px}

/* segmented / chips */
.ac-seg{display:flex;gap:6px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:13px;padding:4px}
.ac-seg-btn{flex:1;padding:9px 6px;border-radius:9px;background:none;border:none;color:var(--muted);
  font-weight:700;font-size:12.5px;cursor:pointer;transition:.15s;white-space:nowrap}
.ac-seg-btn.active{background:var(--surface-3);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}

.ac-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:10px;background:var(--surface-2);
  border:1px solid var(--line);color:var(--text-2);font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s}
.ac-chip.on{background:linear-gradient(100deg,rgba(176,124,255,.22),rgba(111,92,255,.1));color:#fff;border-color:rgba(176,124,255,.4)}

/* hero gradient card */
.ac-hero{position:relative;overflow:hidden;border-radius:var(--r);padding:18px;
  background:linear-gradient(135deg,rgba(111,92,255,.32),rgba(176,124,255,.12) 60%,rgba(91,140,255,.16));
  border:1px solid rgba(176,124,255,.34)}
.ac-hero-glow{position:absolute;width:240px;height:240px;border-radius:50%;right:-80px;top:-110px;
  background:radial-gradient(circle,rgba(176,124,255,.45),transparent 70%);pointer-events:none}

/* progress bar */
.ac-prog{height:9px;border-radius:9px;background:rgba(0,0,0,.35);overflow:hidden;border:1px solid var(--line)}
.ac-prog-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,#6f5cff,#b07cff)}

/* mini map placeholder */
.ac-map{position:relative;height:200px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
.ac-map-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(176,124,255,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(176,124,255,.08) 1px,transparent 1px);background-size:26px 26px;
  background-color:rgba(8,7,16,.6)}
.ac-map-route{position:absolute;left:16%;top:74%;width:64%;height:48%;border-left:2px dashed rgba(176,124,255,.6);
  border-top:2px dashed rgba(176,124,255,.6);border-radius:18px 0 0 0;transform:rotate(0deg)}
.ac-map-ship{position:absolute;font-size:26px;filter:drop-shadow(0 4px 10px rgba(176,124,255,.6));
  animation:acFloat 3s ease-in-out infinite}
@keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ac-map-pin{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 5px rgba(52,211,153,.22),0 0 14px var(--green)}
.ac-map-home{position:absolute;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px;
  background:rgba(91,140,255,.2);border:1px solid rgba(91,140,255,.5)}
.ac-pulse{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--primary)}
.ac-pulse::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--primary);animation:acPulse 1.8s ease-out infinite}
@keyframes acPulse{0%{transform:scale(.6);opacity:.9}100%{transform:scale(2.2);opacity:0}}

/* stat tiles */
.ac-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.ac-stat{display:flex;flex-direction:column;gap:3px;padding:13px;border-radius:14px;background:rgba(0,0,0,.22);border:1px solid var(--line)}
.ac-stat-v{font-family:"Space Grotesk",sans-serif;font-size:19px;font-weight:600;line-height:1.1}
.ac-stat-l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}

/* tweaks panel */
.ac-tweaks{position:fixed;z-index:200;right:16px;bottom:16px;width:300px;max-width:calc(100vw - 32px);
  background:linear-gradient(180deg,#16121f,#0f0c17);border:1px solid var(--line-2);border-radius:18px;
  box-shadow:0 30px 80px -24px rgba(0,0,0,.9);overflow:hidden;font-size:13px}
.ac-tweaks-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line)}
.ac-tweaks-head h4{font-family:"Space Grotesk",sans-serif;font-size:14px;font-weight:600}
.ac-tweaks-body{padding:14px 15px;display:flex;flex-direction:column;gap:15px;max-height:60vh;overflow-y:auto}
.ac-tw-row{display:flex;flex-direction:column;gap:8px}
.ac-tw-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.ac-tw-swatches{display:flex;gap:8px}
.ac-sw{width:30px;height:30px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.15s}
.ac-sw.on{border-color:#fff}

.fadeable{transition:opacity .15s}

/* ───────────── Desktop / tablet portal ───────────── */
.ac-desk-root{position:fixed;inset:0;display:flex;overflow:hidden;
  background:
    radial-gradient(1100px 720px at 80% -12%, rgba(111,92,255,calc(.16*var(--glow))), transparent 55%),
    radial-gradient(900px 620px at 2% 110%, rgba(176,124,255,calc(.11*var(--glow))), transparent 55%),
    var(--bg);}
.ac-auth-root{position:fixed;inset:0;display:grid;place-items:center;overflow:auto;padding:24px;
  background:
    radial-gradient(1000px 700px at 70% 18%, rgba(111,92,255,calc(.22*var(--glow))), transparent 55%),
    radial-gradient(800px 600px at 18% 92%, rgba(176,124,255,calc(.16*var(--glow))), transparent 55%),
    var(--bg);}
.ac-auth-card{position:relative;z-index:1;width:430px;max-width:94vw;max-height:94vh;overflow-y:auto;
  border:1px solid var(--line-2);border-radius:26px;background:linear-gradient(180deg,rgba(22,18,33,.9),rgba(13,11,21,.94));
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:0 50px 120px -40px rgba(0,0,0,.9)}
.ac-side{width:264px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:22px 16px;z-index:5;
  background:linear-gradient(180deg,rgba(18,16,30,.66),rgba(10,9,18,.66));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--line)}
.ac-side-top{display:flex;align-items:center;gap:10px;padding:6px 8px 14px}
.ac-side-tag{font-family:"Space Grotesk",sans-serif;font-size:10px;letter-spacing:.22em;color:var(--primary);font-weight:600;
  border:1px solid rgba(176,124,255,.4);padding:3px 6px;border-radius:5px;background:rgba(176,124,255,.12);line-height:1}
.ac-side-nav{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;margin:0 -4px;padding:0 4px}
.ac-side-sec{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:16px 12px 7px}
.ac-side-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border-radius:11px;border:1px solid transparent;
  background:none;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.16s;text-align:left;position:relative}
.ac-side-item:hover{color:var(--text-2);background:var(--surface)}
.ac-side-item.active{color:#fff;background:linear-gradient(100deg,rgba(176,124,255,.20),rgba(111,92,255,.08));border-color:rgba(176,124,255,.30)}
.ac-side-item.active svg{color:var(--primary)}
.ac-side-badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:20px;background:var(--primary);
  color:#15091f;font-size:11.5px;font-weight:800;display:grid;place-items:center;font-family:"JetBrains Mono",monospace}
.ac-side-foot{margin-top:auto;padding-top:8px}
.ac-side-user{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;background:var(--surface);border:1px solid var(--line)}
.ac-side-user .nm{flex:1;min-width:0}
.ac-side-user .nm b{display:block;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-side-user .nm span{font-size:11px;color:var(--muted)}
.ac-desk-main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ac-desk-top{display:flex;align-items:center;gap:14px;padding:17px 30px;border-bottom:1px solid var(--line);
  background:rgba(8,7,14,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:4}
.ac-desk-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary)}
.ac-desk-title{font-family:"Space Grotesk",sans-serif;font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.15}
.ac-desk-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.ac-desk-content{flex:1;overflow-y:auto;padding:26px 30px 60px}
.ac-desk-avatar-btn{background:none;border:none;padding:0;cursor:pointer;border-radius:50%;flex-shrink:0}
.ac-desk .ac-screen{max-width:1120px;margin:0 auto;display:block;column-count:2;column-gap:20px;animation:none}
.ac-desk .ac-screen>*{break-inside:avoid;margin:0 0 18px}
.ac-desk .ac-screen>.ac-hero,.ac-desk .ac-screen>.ac-seg,.ac-desk .ac-screen>.ac-quick,
.ac-desk .ac-screen>.ac-map,.ac-desk .ac-screen>.oz-btn,.ac-desk .ac-screen>.span-all{column-span:all}
@media(max-width:1180px){.ac-desk .ac-screen{max-width:780px;column-count:1}}
</style>
</head>
